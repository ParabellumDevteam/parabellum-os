services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parabellum
      POSTGRES_PASSWORD: parabellum
      POSTGRES_DB: parabellum
    ports:
      - "5432:5432"
    volumes:
      - parabellum_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parabellum -d parabellum"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  parabellum_pg:
